      <text x="34" y="82" font-size="30" font-weight="700" fill="#1F2D4A">3–28 Aug</text>

      <line x1="250" y1="24" x2="250" y2="86" stroke="#EADFCB" stroke-width="2"/>
      <text x="284" y="46" font-size="20" fill="#6B7280">MON–FRI</text>
      <text x="284" y="82" font-size="30" font-weight="700" fill="#1F2D4A">9:30–10:30am</text>

      <line x1="600" y1="24" x2="600" y2="86" stroke="#EADFCB" stroke-width="2"/>
      <text x="634" y="46" font-size="20" fill="#6B7280">EARLY BIRD</text>
      <text x="634" y="82" font-size="30" font-weight="700" fill="#F08A3E">£199</text>
